services:
  - type: web
    name: spxacademy-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /health

  - type: web
    name: spxacademy
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20.19.5
      - key: VITE_API_BASE_URL
        value: https://spxacademy-api.onrender.com
